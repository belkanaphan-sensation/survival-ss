spring:
  application:
    name: survival
  datasource:
    url: jdbc:postgresql://192.168.1.89:9432/survival
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        #        format_sql: true
        show-sql: true
        #        default_schema: sensation
        default_schema: public
        # Таймаут блокировки в миллисекундах (10 секунд)
        jdbc.lock_timeout: 10000
  transaction:
    default-timeout: 600s  # Глобальный таймаут транзакций
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    #    default_schema: sensation
    default_schema: public
    liquibase-schema: public
logging:
  level:
    liquibase: INFO
    org.hibernate.SQL: INFO
    org.bn.sensation: TRACE
